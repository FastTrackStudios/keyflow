# Continuous deployment of the docsite to fly.io.
#
# GitHub-mirror copy of .forgejo/workflows/deploy-docs.yml (Forgejo reads
# only .forgejo/workflows when that directory exists).
#
# Required secret (org-level): FLY_API_TOKEN — a scoped fly.io deploy token
# for the keyflow-docs app (the env var name flyctl reads natively).
name: deploy-docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/deploy-docs.yml"
      - ".forgejo/workflows/deploy-docs.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    # Self-hosted THEBATTLESHIP runner (docker mode, catthehacker ubuntu
    # image): 3h timeout, local cache server, 8-job capacity.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The workspace manifest path-deps four sibling checkouts (Editor,
      # architect, input_actions, daw) — cargo loads every workspace member's
      # manifest even for a single -p build, so the siblings must exist at
      # the same relative paths as in local dev.
      - name: Clone sibling workspace repos
        run: |
          set -euo pipefail
          clone() { rm -rf "$2" && git clone --depth 1 -b main "https://codeberg.org/FastTrackStudios/$1.git" "$2"; }
          clone Editor        ../../Editor
          clone architect     ../../architect
          clone input_actions ../input_actions
          clone daw           ../daw
          # Editor's manifests reach back into keyflow via
          # ../FastTrackStudio/keyflow (local disk layout, no 's') —
          # bridge it to this checkout.
          mkdir -p ../../FastTrackStudio
          ln -sfn "$(pwd)" ../../FastTrackStudio/keyflow

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      # ddc (dodeca) ships prebuilt binaries — no nix package, no cargo build.
      - name: Install dodeca
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://bearcove-dist.s3.fr-par.scw.cloud/dodeca/install.sh | sh
          # installer drops ddc + ddc-cell-* into ~/.cargo/bin (or ~/.local/bin)
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: docs-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: docs-cargo-${{ runner.os }}-

      - name: Build site
        run: nix develop ./docs --command ./docs/build.sh

      - name: Deploy to fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: nix develop ./docs --command sh -c "cd docs && fly deploy --remote-only"
