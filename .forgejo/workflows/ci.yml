name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        # Fully-qualified: bare `uses:` resolves against data.forgejo.org,
        # which doesn't mirror the cachix actions.
        uses: https://github.com/cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Use FTS Cachix
        uses: https://github.com/cachix/cachix-action@v15
        with:
          name: fasttrackstudio
        continue-on-error: true

      - name: cargo xtask ci
        run: |
          # catthehacker containers ship a /homeless-shelter dir, which trips
          # nix's purity check the moment any derivation actually builds.
          sudo rm -rf /homeless-shelter 2>/dev/null || rm -rf /homeless-shelter || true
          nix develop .#ci --impure --command cargo xtask ci
