# Continuous deployment of the docsite to fly.io.
#
# Required secret (org-level): FLY_API_TOKEN — a scoped fly.io deploy token
# for the keyflow-docs app (the env var name flyctl reads natively).
name: deploy-docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/deploy-docs.yml"
      - ".forgejo/workflows/deploy-docs.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    # Self-hosted THEBATTLESHIP runner (docker mode, catthehacker ubuntu
    # image): 3h timeout, local cache server, 8-job capacity.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The workspace path-deps four sibling checkouts, and Editor's crates
      # path back into keyflow at ../FastTrackStudio/keyflow (the local disk
      # layout). Cargo does NOT canonicalize symlinks — reaching the same
      # crate via two paths is a package collision — so the build tree must
      # genuinely live at <root>/FastTrackStudio/keyflow. Assembled layout:
      #
      #   <root>/Editor
      #   <root>/architect
      #   <root>/FastTrackStudio/{keyflow (build tree), input_actions, daw}
      - name: Assemble workspace layout
        run: |
          set -euo pipefail
          root="$(dirname "$(dirname "$PWD")")"
          clone() { rm -rf "$2" && git clone --depth 1 -b main "https://codeberg.org/FastTrackStudios/$1.git" "$2"; }
          clone Editor        "$root/Editor"
          clone architect     "$root/architect"
          mkdir -p "$root/FastTrackStudio"
          clone input_actions "$root/FastTrackStudio/input_actions"
          clone daw           "$root/FastTrackStudio/daw"
          rm -rf "$root/FastTrackStudio/keyflow"
          cp -a . "$root/FastTrackStudio/keyflow"

      # Fully-qualified: bare `uses:` resolves against data.forgejo.org,
      # which doesn't mirror cachix/install-nix-action.
      - uses: https://github.com/cachix/install-nix-action@v31

      # ddc (dodeca) ships prebuilt binaries — no nix package, no cargo build.
      - name: Install dodeca
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://bearcove-dist.s3.fr-par.scw.cloud/dodeca/install.sh | sh
          # installer drops ddc + ddc-cell-* into ~/.cargo/bin (or ~/.local/bin)
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: docs-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: docs-cargo-${{ runner.os }}-

      - name: Build site
        run: |
          cd "$(dirname "$(dirname "$PWD")")/FastTrackStudio/keyflow"
          nix develop ./docs --command ./docs/build.sh

      - name: Deploy to fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          cd "$(dirname "$(dirname "$PWD")")/FastTrackStudio/keyflow"
          nix develop ./docs --command sh -c "cd docs && fly deploy --remote-only"
