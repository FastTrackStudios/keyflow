<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Keyflow{% endblock title %}</title>
    <meta name="description"
        content="{% block description %}Keyflow — plain-text chart notation and rendering engine{% endblock description %}">
    <style>
        :root {
            --fg: #1b1b1f;
            --muted: #6a6a73;
            --accent: #3b6ea5;
            --bg: #ffffff;
            --soft: #fafafa;
            --line: #e6e6ea;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--fg);
            background: var(--bg);
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .site-nav {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: .8rem 1.5rem;
            border-bottom: 1px solid var(--line);
        }

        .site-nav-brand { font-weight: 700; font-size: 1.15rem; color: var(--fg); }

        .layout { display: flex; max-width: 1120px; margin: 0 auto; }

        .sidebar {
            width: 240px;
            flex: 0 0 240px;
            padding: 1.5rem 1rem;
            border-right: 1px solid var(--line);
        }

        .sidebar h3 {
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            margin: 1.1rem 0 .35rem;
        }

        .sidebar ul { list-style: none; padding: 0; margin: 0; }
        .sidebar li { margin: .18rem 0; }

        .content { flex: 1 1 auto; min-width: 0; padding: 1.5rem 2.2rem 4rem; }
        .content h1 { margin-top: 0; }

        table { border-collapse: collapse; margin: 1rem 0; }
        th, td { border: 1px solid var(--line); padding: .3rem .65rem; }

        pre { background: #f6f8fa; padding: .8rem 1rem; border-radius: 6px; overflow: auto; }
        code { font-family: ui-monospace, Menlo, monospace; font-size: .92em; }

        /* Engraved chart from a ```kf``` block. */
        figure.kf-chart {
            margin: 1.3rem 0;
            padding: 1rem 1.2rem;
            background: var(--soft);
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow-x: auto;
        }

        figure.kf-chart svg { max-width: 100%; height: auto; display: block; }
    </style>
</head>

<body>
    <nav class="site-nav">
        <a href="/" class="site-nav-brand">Keyflow</a>
    </nav>

    {% block body %}
    <div class="layout">
        <aside class="sidebar">
            <nav>
                {% for sub in root.subsections %}
                <h3><a href="{{ sub.permalink }}">{{ sub.title }}</a></h3>
                <ul>
                    {% for page in sub.pages %}
                    <li><a href="{{ page.permalink }}">{{ page.title }}</a></li>
                    {% endfor %}
                </ul>
                {% endfor %}
            </nav>
        </aside>
        <main class="content">
            {% block content %}{% endblock content %}
        </main>
    </div>
    {% endblock body %}
</body>

</html>
