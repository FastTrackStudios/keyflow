<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Keyflow{% endblock title %}</title>
    <meta name="description" content="{% block description %}Keyflow — plain-text chart notation and engraving for lead sheets, rhythm charts, and melodies.{% endblock description %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Recursive:slnt,wght,CASL,CRSV,MONO@-15..0,300..1000,0..1,0..1,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="{% block body_class %}{% endblock body_class %}">
    <nav class="site-nav">
        <a href="/" class="site-nav-brand">
            <svg viewBox="0 0 32 32" width="28" height="28" class="site-nav-logo" aria-hidden="true">
                <path d="M11 5h2v17a4 4 0 1 1-2-3.46V5z" fill="currentColor"/>
                <path d="M13 5l9-2v14a4 4 0 1 1-2-3.46V5.6L13 7.6V5z" fill="currentColor"/>
            </svg>
            <span>Keyflow</span>
        </a>
        <div class="site-nav-spacer"></div>
        <a href="https://github.com/FastTrackStudios/keyflow" class="site-nav-github" title="GitHub">
            <svg viewBox="0 0 16 16" width="24" height="24" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
        </a>
    </nav>

    {% block body %}
    <div class="layout">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                {% for sub in root.subsections %}
                <div class="sidebar-section">
                    <h3><a href="{{ sub.permalink }}"{% if current_path and current_path == sub.path %} class="active"{% endif %}>{{ sub.title }}</a></h3>
                    <ul>
                        {% for pg in sub.pages %}
                        <li><a href="{{ pg.permalink }}"{% if current_path and current_path == pg.path %} class="active"{% endif %}>{{ pg.title }}</a></li>
                        {% endfor %}
                    </ul>
                </div>
                {% endfor %}

            </nav>
        </aside>
        <main class="content">
            {% block content %}{% endblock content %}
        </main>
    </div>
    {% endblock body %}

    <footer>
        <p>
            Keyflow · <a href="https://github.com/FastTrackStudios/keyflow">GitHub</a>
            · Built with <a href="https://github.com/bearcove/dodeca">dodeca</a>
            · Typeset in <a href="https://fonts.google.com/specimen/Recursive">Recursive</a>
        </p>
    </footer>

    <script src="/js/dodeca.js"></script>
</body>
</html>
