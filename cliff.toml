# git-cliff config — generates CHANGELOG.md from conventional commits.
# (Shared FTS shape; see architect/cliff.toml for the original.)
#
# Run:
#   git cliff -o CHANGELOG.md          regenerate full changelog
#   git cliff --tag v0.2.0 --bump      preview release notes for the next bump

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/);
this project follows [Conventional Commits](https://www.conventionalcommits.org/en/v1.0.0/)
so the file is regenerated by `git cliff` from commit history.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    { message = "^feat",        group = "Features" },
    { message = "^fix",         group = "Fixes" },
    { message = "^perf",        group = "Performance" },
    { message = "^refactor",    group = "Refactor" },
    { message = "^doc",         group = "Documentation" },
    { message = "^docs",        group = "Documentation" },
    { message = "^test",        group = "Tests" },
    { message = "^chore",       group = "Chore" },
    { message = "^ci",          group = "CI" },
    { message = "^style",       group = "Style" },
    { message = "^build",       group = "Build" },
    { message = "^revert",      group = "Reverted" },
    { message = "^rename",      group = "Refactor" },
    { message = "^scaffold",    group = "Features" },
    { message = "^move",        group = "Refactor" },
    { message = "^restructure", group = "Refactor" },
    { message = ".*",           group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
