[package]
name = "tree-sitter-keyflow"
description = "Tree-sitter grammar for Keyflow chart notation (.kf)"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
build = "bindings/rust/build.rs"
include = [
  "bindings/rust/*",
  "grammar.js",
  "queries/*",
  "src/*",
  "package.json",
  "README.md",
]

[lib]
path = "bindings/rust/lib.rs"

[dependencies]
tree-sitter-language = "0.1"

[build-dependencies]
cc = "1"

# The C parser source is generated by `tree-sitter generate` from
# `grammar.js`. The build script is a no-op until `src/parser.c` exists,
# so the crate builds (with the rust binding stub) immediately and gains
# real parsing as soon as `npm run gen` is run by a grammar maintainer.

[lints]
workspace = true
