[workspace]
members = ["crates/*", "xtask", "examples/web-editor"]
resolver = "2"

[workspace.package]
version = "0.0.1"
edition = "2021"
authors = ["FastTrack Studio"]
license = "MIT OR Apache-2.0"

[workspace.lints.rust]
unused = "warn"

[workspace.lints.clippy]
# Permissive stylistic lints — WIP workspace, don't block CI on these.
field_reassign_with_default = "allow"
redundant_closure = "allow"
nonminimal_bool = "allow"
clone_on_copy = "allow"
useless_vec = "allow"
large_enum_variant = "allow"
if_same_then_else = "allow"
explicit_counter_loop = "allow"
manual_strip = "allow"
too_many_arguments = "allow"
double_must_use = "allow"
manual_clamp = "allow"
vec_init_then_push = "allow"
collapsible_match = "allow"
filter_next = "allow"

[workspace.dependencies]
# Public crates (facade + UI)
keyflow = { path = "crates/keyflow" }
keyflow-ui = { path = "crates/keyflow-ui" }
engraver = { path = "crates/engraver" }

# The standalone Editor (CodeMirror-style contenteditable editor) lives in
# its own repo at ../../Editor and is shared with Task. `editor` is the
# umbrella widget; `editor-keyflow-lang` maps keyflow highlighting + IDE
# diagnostics onto the editor's decoration model; `editor-keyflow` renders
# `.kf` fences to inline SVG. Web/wasm only for now — the contenteditable
# view doesn't run on dioxus-native/Blitz yet.
editor = { git = "https://codeberg.org/FastTrackStudios/Editor.git", branch = "main" }
editor-state = { git = "https://codeberg.org/FastTrackStudios/Editor.git", branch = "main" }
editor-keyflow = { git = "https://codeberg.org/FastTrackStudios/Editor.git", branch = "main" }
editor-keyflow-lang = { git = "https://codeberg.org/FastTrackStudios/Editor.git", branch = "main" }

# FastTrack Studio shared design system. Lives in the sibling fts-ui repo.
fts-ui = { git = "https://git.starcommand.live/FastTrackStudios/fts-ui.git", branch = "main", package = "fts-ui" }

# Facet reflection — align the stack to the current 0.46 line.
facet = { version = "0.46" }
facet-core = { version = "0.46" }
facet-format = { version = "0.47" }
facet-json = { version = "0.46" }
facet-postcard = { version = "0.46" }
facet-pretty = { version = "0.46" }
facet-value = { version = "0.46" }
facet-yaml = { version = "0.46" }

# VOX service framework. Pinned to the starcommand fork @ f31f1040 (vox
# 0.8.2) — the rev `architect` (local path below) uses, and the one whose
# tokio deps are `#[cfg(not(wasm))]`-gated so the editor builds for wasm.
# The `[patch."https://github.com/bearcove/vox"]` block below folds every
# transitive bearcove/vox reference onto this same rev.
vox = { git = "https://git.starcommand.live/FastTrackStudios/vox", rev = "f31f10400c245740a072fa61bb96ef3a3fc2bd93" }
vox-types = { git = "https://git.starcommand.live/FastTrackStudios/vox", rev = "f31f10400c245740a072fa61bb96ef3a3fc2bd93" }
vox-stream = { git = "https://git.starcommand.live/FastTrackStudios/vox", rev = "f31f10400c245740a072fa61bb96ef3a3fc2bd93" }

# architect framework — defines #[architect::rpc] for sync-trait → vox RPC
# bridging. Local path (matching Task) so architect's vox-0.8.2 / runtime-
# only profile drives the whole graph and the wasm build stays mio-free.
architect = { git = "https://codeberg.org/FastTrackStudios/architect.git", branch = "main" }
architect-rpc-derive = { git = "https://codeberg.org/FastTrackStudios/architect.git", branch = "main" }

# Rendering
anyrender = { git = "https://github.com/DioxusLabs/anyrender.git", branch = "main" }
anyrender_vello = { git = "https://github.com/DioxusLabs/anyrender.git", branch = "main" }
anyrender_vello_hybrid = { git = "https://github.com/DioxusLabs/anyrender.git", branch = "main" }
vello_hybrid = "0.0.6"
vello_common = "0.0.6"
peniko = "0.6"
kurbo = "0.13"

# UI
dioxus-native = "0.7.1"

# Sibling repos
# `daw-module`/`daw-proto`/`dawfile-reaper` are internal type-only crates.
# Pre-keyflow-daw-analysis, daw-reaper depended on keyflow for chord
# detection, which closed a cycle if keyflow used the `daw` facade. That
# dep was lifted (daw 11c6062 + keyflow-daw-analysis here), so keyflow
# could now use `daw` — but for purely type/trait imports the internal
# crates are still the lighter choice.
daw-module = { git = "https://codeberg.org/FastTrackStudios/daw.git", branch = "main" }
daw-proto = { git = "https://codeberg.org/FastTrackStudios/daw.git", branch = "main" }
dawfile-reaper = { git = "https://codeberg.org/FastTrackStudios/daw.git", branch = "main" }
# Full daw facade — needed by `keyflow-daw-analysis` only.
daw = { git = "https://codeberg.org/FastTrackStudios/daw.git", branch = "main" }
keyflow-daw-analysis = { path = "crates/keyflow-daw-analysis" }
color-palette = { git = "https://codeberg.org/FastTrackStudios/dynamic-template.git", branch = "main" }
music-catalog = { git = "https://codeberg.org/FastTrackStudios/dynamic-template.git", branch = "main" }
session = { git = "https://codeberg.org/FastTrackStudios/session.git", branch = "main" }
session-ui = { git = "https://codeberg.org/FastTrackStudios/session.git", branch = "main" }
dock-dioxus = { git = "https://codeberg.org/FastTrackStudios/dock-dioxus.git", branch = "main" }
dock-proto = { git = "https://codeberg.org/FastTrackStudios/dock-dioxus.git", branch = "main" }

# Common dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tracing = { version = "0.1", features = ["std"] }

# MusicXML parsing — full MusicXML 4.0 spec, supports .musicxml and .mxl.
musicxml = "1.1"

keyflow-musicxml = { path = "crates/keyflow-musicxml" }

