[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["FastTrack Studio"]
license = "MIT OR Apache-2.0"

[workspace.lints.rust]

[workspace.lints.clippy]

[workspace.dependencies]
# Internal crates
keyflow = { path = "crates/keyflow" }
keyflow-proto = { path = "crates/keyflow-proto" }
keyflow-text = { path = "crates/keyflow-text" }
keyflow-midi = { path = "crates/keyflow-midi" }
keyflow-ui = { path = "crates/keyflow-ui" }
engraver = { path = "crates/engraver" }
engraver-proto = { path = "crates/engraver-proto" }

# Facet reflection
facet = { git = "https://github.com/facet-rs/facet", branch = "main" }

# Roam RPC framework (pinned — latest main needs peeps sub-crates not yet published)
roam = { git = "https://github.com/bearcove/roam.git", rev = "30a8e10" }

# Rendering
anyrender = { git = "https://github.com/DioxusLabs/anyrender.git", branch = "main" }
anyrender_vello = { git = "https://github.com/DioxusLabs/anyrender.git", branch = "main" }
peniko = "0.6"
kurbo = "0.13"

# UI
dioxus-native = "0.7.1"

# Sibling repos (local paths)
daw-control = { path = "../daw/crates/daw-control" }
daw-proto = { path = "../daw/crates/daw-proto" }
color-palette = { path = "../dynamic-template/crates/color-palette" }
session = { path = "../FastTrackStudio/crates/session/session" }
session-ui = { path = "../FastTrackStudio/crates/session/session-ui" }
dock-dioxus = { path = "../dock-dioxus/crates/dock-dioxus" }
dock-proto = { path = "../dock-dioxus/crates/dock-proto" }

# Common dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tracing = { version = "0.1", features = ["std"] }
