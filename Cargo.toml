[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["FastTrack Studio"]
license = "MIT OR Apache-2.0"

[workspace.lints.rust]
unused = "allow"

[workspace.lints.clippy]

[workspace.dependencies]
# Public crates (facade + UI)
keyflow = { path = "crates/keyflow" }
keyflow-ui = { path = "crates/keyflow-ui" }
engraver = { path = "crates/engraver" }

# Facet reflection - use crates.io 0.43.x to match roam's constraint
facet = { version = "0.44" }
facet-core = { version = "0.44" }
facet-format = { version = "0.44" }
facet-json = { version = "0.44" }
facet-postcard = { version = "0.44" }
facet-pretty = { version = "0.44" }
facet-value = { version = "0.44" }
facet-yaml = { version = "0.44" }

# Roam RPC framework (pinned — latest main needs peeps sub-crates not yet published)
roam = { git = "https://github.com/bearcove/roam.git", branch = "main" }

# Rendering
anyrender = { git = "https://github.com/DioxusLabs/anyrender.git", branch = "main" }
anyrender_vello = { git = "https://github.com/DioxusLabs/anyrender.git", branch = "main" }
anyrender_vello_hybrid = { git = "https://github.com/DioxusLabs/anyrender.git", branch = "main" }
vello_hybrid = "0.0.6"
vello_common = "0.0.6"
peniko = "0.6"
kurbo = "0.13"

# UI
dioxus-native = "0.7.1"

# Sibling repos
daw-control = { git = "https://github.com/FastTrackStudios/daw.git", branch = "main" }
daw-proto = { git = "https://github.com/FastTrackStudios/daw.git", branch = "main" }
dawfile-reaper = { git = "https://github.com/FastTrackStudios/daw.git", branch = "main" }
color-palette = { git = "https://github.com/FastTrackStudios/dynamic-template.git", branch = "main" }
music-catalog = { git = "https://github.com/FastTrackStudios/dynamic-template.git", branch = "main" }
session = { git = "https://github.com/FastTrackStudios/FastTrackStudio.git", branch = "main" }
session-ui = { git = "https://github.com/FastTrackStudios/FastTrackStudio.git", branch = "main" }
dock-dioxus = { git = "https://github.com/FastTrackStudios/dock-dioxus.git", branch = "main" }
dock-proto = { git = "https://github.com/FastTrackStudios/dock-dioxus.git", branch = "main" }

# Common dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tracing = { version = "0.1", features = ["std"] }

