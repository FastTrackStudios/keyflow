[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["FastTrack Studio"]
license = "MIT OR Apache-2.0"

[workspace.lints.rust]
unused = "allow"

[workspace.lints.clippy]

[workspace.dependencies]
# Public crates (facade + UI)
keyflow = { path = "crates/keyflow" }
keyflow-ui = { path = "crates/keyflow-ui" }
engraver = { path = "crates/engraver" }

# FastTrack Studio shared design system. Lives in the sibling fts-ui repo.
fts-ui = { path = "../fts-ui/crates/fts-ui" }

# Facet reflection — align the stack to the current 0.46 line.
facet = { version = "0.46" }
facet-core = { version = "0.46" }
facet-format = { version = "0.47" }
facet-json = { version = "0.46" }
facet-postcard = { version = "0.46" }
facet-pretty = { version = "0.46" }
facet-value = { version = "0.46" }
facet-yaml = { version = "0.46" }

# VOX service framework. Aligned with daw + architect on the bearcove
# upstream rev so the FTS workspace ships a single vox copy.
vox = { git = "https://github.com/bearcove/vox", rev = "27eef573efd388bddaad0befdd59143a7e98b830" }
vox-types = { git = "https://github.com/bearcove/vox", rev = "27eef573efd388bddaad0befdd59143a7e98b830" }
vox-stream = { git = "https://github.com/bearcove/vox", rev = "27eef573efd388bddaad0befdd59143a7e98b830" }

# architect framework — defines #[architect::rpc] for sync-trait → vox
# RPC bridging. Path dep onto local checkout, matching daw's setup.
architect = { git = "https://git.starcommand.live/FastTrackStudios/architect.git", branch = "main" }
architect-rpc-derive = { git = "https://git.starcommand.live/FastTrackStudios/architect.git", branch = "main" }

# Rendering
anyrender = { git = "https://github.com/DioxusLabs/anyrender.git", branch = "main" }
anyrender_vello = { git = "https://github.com/DioxusLabs/anyrender.git", branch = "main" }
anyrender_vello_hybrid = { git = "https://github.com/DioxusLabs/anyrender.git", branch = "main" }
vello_hybrid = "0.0.6"
vello_common = "0.0.6"
peniko = "0.6"
kurbo = "0.13"

# UI
dioxus-native = "0.7.1"

# Sibling repos
# `daw-module`/`daw-proto`/`dawfile-reaper` are internal type-only crates.
# Pre-keyflow-daw-analysis, daw-reaper depended on keyflow for chord
# detection, which closed a cycle if keyflow used the `daw` facade. That
# dep was lifted (daw 11c6062 + keyflow-daw-analysis here), so keyflow
# could now use `daw` — but for purely type/trait imports the internal
# crates are still the lighter choice.
daw-module = { git = "https://github.com/FastTrackStudios/daw.git", branch = "main" }
daw-proto = { git = "https://github.com/FastTrackStudios/daw.git", branch = "main" }
dawfile-reaper = { git = "https://github.com/FastTrackStudios/daw.git", branch = "main" }
# Full daw facade — needed by `keyflow-daw-analysis` only.
daw = { git = "https://github.com/FastTrackStudios/daw.git", branch = "main" }
keyflow-daw-analysis = { path = "crates/keyflow-daw-analysis" }
color-palette = { git = "https://github.com/FastTrackStudios/dynamic-template.git", branch = "main" }
music-catalog = { git = "https://github.com/FastTrackStudios/dynamic-template.git", branch = "main" }
session = { git = "https://github.com/FastTrackStudios/session.git", branch = "main" }
session-ui = { git = "https://github.com/FastTrackStudios/session.git", branch = "main" }
dock-dioxus = { git = "https://github.com/FastTrackStudios/dock-dioxus.git", branch = "main" }
dock-proto = { git = "https://github.com/FastTrackStudios/dock-dioxus.git", branch = "main" }

# Common dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tracing = { version = "0.1", features = ["std"] }

# MusicXML parsing — full MusicXML 4.0 spec, supports .musicxml and .mxl.
musicxml = "1.1"

keyflow-musicxml = { path = "crates/keyflow-musicxml" }

# ── Local development overrides ──────────────────────────────────────
# Uncomment to use local checkouts instead of GitHub.
#
[patch."https://github.com/FastTrackStudios/daw.git"]
daw = { path = "../daw/crates/daw" }
daw-module = { path = "../daw/crates/daw-module" }
daw-proto = { path = "../daw/crates/daw-proto" }
dawfile-reaper = { path = "../daw/crates/dawfile-reaper" }
#
# [patch."https://github.com/FastTrackStudios/dynamic-template.git"]
# color-palette = { path = "../dynamic-template/crates/color-palette" }
# music-catalog = { path = "../dynamic-template/crates/music-catalog" }
#
[patch."https://github.com/FastTrackStudios/session.git"]
session = { path = "../session/crates/session" }
session-ui = { path = "../session/crates/session-ui" }
session-proto = { path = "../session/crates/session-proto" }

# Session's own workspace toml references `keyflow-daw-analysis` (a
# new crate) by git url, but that branch tip predates the crate. Loop
# back to our local sibling so resolution succeeds.
[patch."https://github.com/FastTrackStudios/keyflow.git"]
keyflow = { path = "crates/keyflow" }
keyflow-proto = { path = "crates/keyflow-proto" }
keyflow-text = { path = "crates/keyflow-text" }
keyflow-daw-analysis = { path = "crates/keyflow-daw-analysis" }
keyflow-syntax = { path = "crates/keyflow-syntax" }
keyflow-live = { path = "crates/keyflow-live" }
engraver = { path = "crates/engraver" }
engraver-proto = { path = "crates/engraver-proto" }
#
# [patch."https://github.com/FastTrackStudios/input_actions.git"]
# actions-proto = { path = "../input_actions/crates/actions-proto" }
#
# [patch."https://github.com/FastTrackStudios/dock-dioxus.git"]
# dock-dioxus = { path = "../dock-dioxus/crates/dock-dioxus" }
# dock-proto = { path = "../dock-dioxus/crates/dock-proto" }

# Force every transitive `fts-ui` (currently pulled in via session-ui's git
# dep) to resolve to the local sibling checkout, so the workspace ships a
# single fts-ui version and components composed in keyflow-ui interop with
# components composed in session-ui.
[patch."https://github.com/FastTrackStudios/fts-ui.git"]
fts-ui = { path = "../fts-ui/crates/fts-ui" }

# Vox pins live in `[workspace.dependencies]` above — direct + transitive
# refs already resolve to the same bearcove rev now that keyflow + daw +
# architect + session are aligned.
