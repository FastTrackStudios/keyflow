generational-box = { git = "https://git.starcommand.live/codywright/dioxus", rev = "32d9f5154fa9124b05be73b82e8b04fe717a730f", package = "generational-box" }
manganis = { git = "https://git.starcommand.live/codywright/dioxus", rev = "32d9f5154fa9124b05be73b82e8b04fe717a730f", package = "manganis" }
manganis-core = { git = "https://git.starcommand.live/codywright/dioxus", rev = "32d9f5154fa9124b05be73b82e8b04fe717a730f", package = "manganis-core" }
manganis-macro = { git = "https://git.starcommand.live/codywright/dioxus", rev = "32d9f5154fa9124b05be73b82e8b04fe717a730f", package = "manganis-macro" }

# Vendored mermaid-rs-renderer fork (web-time for wasm32) lives in the Editor
# repo and backs editor-mermaid. `[patch]` only applies from the build-root
# workspace, so keyflow carries it too even though Editor declares it
# internally — without this, editor-mermaid pulls upstream 0.2.2 which panics
# on wasm32.
mermaid-rs-renderer = { git = "https://codeberg.org/FastTrackStudios/Editor.git", branch = "main" }

# ── Editor wasm dependency unification ───────────────────────────────
# The Editor (via editor-keyflow → engraver → keyflow-proto → daw-proto)
# reaches the vox RPC stack. Without these patches keyflow's graph carries
# THREE conflicting vox copies (bearcove / Codys-Wright / starcommand) and
# the wrong daw-proto profile, which pulls vox's full tokio-net transport →
# `mio`, which can't build for `wasm32`. These mirror Task's working web
# build verbatim (paths adapted to keyflow's location): they fold every vox
# reference onto the single starcommand fork and point daw-proto + actions-
# proto at their local checkouts so daw-proto's runtime-only (wasm-friendly)
# vox profile applies. See Task/Cargo.toml for the original rationale.
[patch."https://github.com/FastTrackStudios/input_actions.git"]
actions-proto = { git = "https://codeberg.org/FastTrackStudios/input_actions.git", branch = "main" }

[patch."https://git.starcommand.live/FastTrackStudios/input_actions.git"]
actions-proto = { git = "https://codeberg.org/FastTrackStudios/input_actions.git", branch = "main" }

